server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: empresa-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: spring-logs
          environment: production
          app: empresa
          # Ruta DENTRO del contenedor de Promtail (definida en su volumen)
          __path__: /var/log/app/*.log